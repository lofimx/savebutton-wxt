<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="33 33 446 446">
  <defs>
    <mask id="hole-mask">
      <rect x="0" y="0" width="512" height="512" fill="white"/>
      <circle cx="106" cy="96" r="22" fill="black"/>
      <circle cx="406" cy="96" r="22" fill="black"/>
    </mask>
    <linearGradient id="yellow-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffc830"/>
      <stop offset="100%" stop-color="#e89f00"/>
    </linearGradient>
  </defs>
  <!-- Floppy body with holes punched through -->
  <path
    d="M122,40 H390 A82,82 0 0 1 472,122 V390 A82,82 0 0 1 390,472 H140 A20,20 0 0 1 126,466 L46,398 A20,20 0 0 1 40,384 V122 A82,82 0 0 1 122,40 Z"
    fill="url(#yellow-gradient)"
    stroke="#000000"
    stroke-width="14"
    stroke-linejoin="round"
    mask="url(#hole-mask)"/>
  <!-- Specular highlights -->
  <rect x="50" y="130" width="20" height="120" rx="10" fill="#ffffff" fill-opacity="0.7"/>
  <rect x="50" y="300" width="16" height="70" rx="8" fill="#ffffff" fill-opacity="0.55"/>
  <!-- Hole borders -->
  <circle cx="106" cy="96" r="22" fill="none" stroke="#000000" stroke-width="12"/>
  <circle cx="406" cy="96" r="22" fill="none" stroke="#000000" stroke-width="12"/>
  <!-- Sticker label -->
  <rect x="130.50179" y="112" width="250.99643" height="188" rx="46" fill="#fffbe6" stroke="#000000" stroke-width="12"/>
  <!-- Metal slider -->
  <rect x="131" y="340" width="250" height="132" rx="20" fill="#E5E5E5" stroke="#000000" stroke-width="12"/>
  <rect x="160" y="375" width="60" height="75" rx="10" fill="url(#yellow-gradient)" stroke="#000000" stroke-width="8"/>
  <!-- Kawaii face -->
  <g transform="matrix(0.81644503,0,0,0.81644503,46.572924,47.464915)">
    <circle cx="169.42451" cy="171.17914" r="33.453533" fill="#000000"/>
    <circle cx="343.38287" cy="171.17914" r="33.453533" fill="#000000"/>
    <path d="m 222.95017,221.35943 q 33.45353,33.45353 66.90706,0" fill="none" stroke-width="20.0721" stroke-linecap="round" stroke="#000000"/>
  </g>
</svg>
