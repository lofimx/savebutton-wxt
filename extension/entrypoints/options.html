<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="manifest.open_in_tab" content="false" />
    <title>Save Button Preferences</title>
    <link rel="stylesheet" href="./options/style.css" />
  </head>
  <body class="min-h-screen p-5 bg-neutral-100 dark:bg-neutral-950">
    <div id="options" class="max-w-[400px] mx-auto bg-white dark:bg-neutral-900 p-6 rounded-lg shadow-md dark:shadow-neutral-950/50">
      <h1 class="text-lg font-semibold text-neutral-900 dark:text-neutral-100 mb-5 pb-3 border-b border-neutral-200 dark:border-neutral-700">Save Button Preferences</h1>

      <div class="form-group mb-4">
        <label for="server" class="block text-[13px] font-medium text-neutral-600 dark:text-neutral-400 mb-1.5">Save Button Server</label>
        <input
          type="url"
          id="server"
          class="w-full px-3 py-2.5 border border-neutral-200 dark:border-neutral-700 rounded bg-white dark:bg-neutral-800 text-sm text-neutral-900 dark:text-neutral-100 transition-colors duration-200 focus:outline-none focus:border-primary-400 placeholder:text-neutral-400 dark:placeholder:text-neutral-500"
          placeholder="https://savebutton.com"
        />
        <p class="text-xs text-neutral-400 dark:text-neutral-500 mt-1">The URL of your Save Button server</p>
      </div>

      <div class="form-group mb-4">
        <label for="email" class="block text-[13px] font-medium text-neutral-600 dark:text-neutral-400 mb-1.5">Email</label>
        <input type="email" id="email"
          class="w-full px-3 py-2.5 border border-neutral-200 dark:border-neutral-700 rounded bg-white dark:bg-neutral-800 text-sm text-neutral-900 dark:text-neutral-100 transition-colors duration-200 focus:outline-none focus:border-primary-400 placeholder:text-neutral-400 dark:placeholder:text-neutral-500"
          placeholder="you@example.com" />
      </div>

      <div class="form-group mb-4">
        <label for="password" class="block text-[13px] font-medium text-neutral-600 dark:text-neutral-400 mb-1.5">Password</label>
        <input
          type="password"
          id="password"
          class="w-full px-3 py-2.5 border border-neutral-200 dark:border-neutral-700 rounded bg-white dark:bg-neutral-800 text-sm text-neutral-900 dark:text-neutral-100 transition-colors duration-200 focus:outline-none focus:border-primary-400 placeholder:text-neutral-400 dark:placeholder:text-neutral-500"
          placeholder="Your password"
        />
      </div>

      <div class="button-group flex gap-2.5 mt-5">
        <button id="save-btn" class="primary px-5 py-2.5 bg-primary-400 hover:bg-primary-500 rounded-lg border-none text-sm font-bold text-neutral-900 cursor-pointer transition-colors duration-200">Save</button>
        <button id="test-btn" class="px-5 py-2.5 bg-white dark:bg-neutral-800 hover:bg-neutral-50 dark:hover:bg-neutral-700 border border-neutral-200 dark:border-neutral-700 hover:border-neutral-300 dark:hover:border-neutral-600 rounded-lg text-sm font-medium text-neutral-900 dark:text-neutral-100 cursor-pointer transition-colors duration-200">Test Connection</button>
      </div>

      <div id="status" class="hidden"></div>
    </div>
    <script type="module" src="./options/main.ts"></script>
  </body>
</html>
