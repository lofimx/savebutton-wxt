<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="color-scheme" content="light dark" />
    <meta name="manifest.open_in_tab" content="false" />
    <title>Save Button Preferences</title>
    <link rel="stylesheet" href="./options/style.css" />
  </head>
  <body class="min-h-screen p-5 bg-neutral-100 dark:bg-neutral-950">
    <div id="options" class="max-w-[400px] mx-auto bg-white dark:bg-neutral-900 p-6 rounded-lg shadow-md dark:shadow-neutral-950/50">
      <h1 class="text-lg font-semibold text-neutral-900 dark:text-neutral-100 mb-5 pb-3 border-b border-neutral-200 dark:border-neutral-700">Save Button Preferences</h1>

      <!-- Connected state -->
      <div id="connected-view" class="hidden">
        <div class="mb-4 flex items-center gap-2">
          <span id="connected-icon" class="shrink-0"></span>
          <div>
            <p class="text-[13px] text-neutral-500 dark:text-neutral-400">Signed in as</p>
            <p id="connected-email" class="text-sm text-neutral-900 dark:text-neutral-100 font-medium"></p>
          </div>
        </div>

        <div class="flex gap-2.5 mt-5">
          <button id="test-connected-btn" class="px-5 py-2.5 bg-white dark:bg-neutral-800 hover:bg-neutral-50 dark:hover:bg-neutral-700 border border-neutral-200 dark:border-neutral-700 hover:border-neutral-300 dark:hover:border-neutral-600 rounded-lg text-sm font-medium text-neutral-900 dark:text-neutral-100 cursor-pointer transition-colors duration-200">Test Connection</button>
          <button id="sign-out-btn" class="px-5 py-2.5 bg-white dark:bg-neutral-800 hover:bg-red-50 dark:hover:bg-red-950/30 border border-neutral-200 dark:border-neutral-700 hover:border-red-300 dark:hover:border-red-800 rounded-lg text-sm font-medium text-red-600 dark:text-red-400 cursor-pointer transition-colors duration-200">Sign Out</button>
        </div>
      </div>

      <!-- Login state -->
      <div id="login-view">
        <!-- Provider buttons -->
        <div class="flex flex-col gap-2 mb-4">
          <button id="google-sign-in-btn" class="w-full flex items-center justify-center gap-2 px-5 py-2.5 bg-white dark:bg-neutral-800 hover:bg-neutral-50 dark:hover:bg-neutral-700 border border-neutral-200 dark:border-neutral-700 hover:border-neutral-300 dark:hover:border-neutral-600 rounded-lg text-sm font-medium text-neutral-900 dark:text-neutral-100 cursor-pointer transition-colors duration-200">
            <img src="/icon/icon-google.svg" alt="" class="w-[18px] h-[18px]" />
            Sign in with Google
          </button>
          <button id="microsoft-sign-in-btn" class="w-full flex items-center justify-center gap-2 px-5 py-2.5 bg-white dark:bg-neutral-800 hover:bg-neutral-50 dark:hover:bg-neutral-700 border border-neutral-200 dark:border-neutral-700 hover:border-neutral-300 dark:hover:border-neutral-600 rounded-lg text-sm font-medium text-neutral-900 dark:text-neutral-100 cursor-pointer transition-colors duration-200">
            <img src="/icon/icon-microsoft.svg" alt="" class="w-[18px] h-[18px]" />
            Sign in with Microsoft
          </button>
          <button disabled class="w-full flex items-center justify-center gap-2 px-5 py-2.5 bg-neutral-50 dark:bg-neutral-800/50 border border-neutral-200 dark:border-neutral-700 rounded-lg text-sm font-medium text-neutral-400 dark:text-neutral-500 cursor-not-allowed">
            <img src="/icon/icon-apple.svg" alt="" class="w-[18px] h-[18px] opacity-40" />
            Sign in with Apple
            <span class="text-[10px] px-1.5 py-0.5 bg-neutral-200 dark:bg-neutral-700 text-neutral-500 dark:text-neutral-400 rounded-full">Coming soon</span>
          </button>
        </div>

        <div class="flex items-center gap-3 my-5">
          <div class="flex-1 h-px bg-neutral-200 dark:bg-neutral-700"></div>
          <span class="text-xs text-neutral-400 dark:text-neutral-500">or</span>
          <div class="flex-1 h-px bg-neutral-200 dark:bg-neutral-700"></div>
        </div>

        <!-- Email/password sign-in -->
        <div class="form-group mb-4">
          <label for="email" class="block text-[13px] font-medium text-neutral-600 dark:text-neutral-400 mb-1.5">Email</label>
          <input type="email" id="email"
            class="w-full px-3 py-2.5 border border-neutral-200 dark:border-neutral-700 rounded bg-white dark:bg-neutral-800 text-sm text-neutral-900 dark:text-neutral-100 transition-colors duration-200 focus:outline-none focus:border-primary-400 placeholder:text-neutral-400 dark:placeholder:text-neutral-500"
            placeholder="you@example.com" />
        </div>

        <div class="form-group mb-4">
          <label for="password" class="block text-[13px] font-medium text-neutral-600 dark:text-neutral-400 mb-1.5">Password</label>
          <input
            type="password"
            id="password"
            class="w-full px-3 py-2.5 border border-neutral-200 dark:border-neutral-700 rounded bg-white dark:bg-neutral-800 text-sm text-neutral-900 dark:text-neutral-100 transition-colors duration-200 focus:outline-none focus:border-primary-400 placeholder:text-neutral-400 dark:placeholder:text-neutral-500"
            placeholder="Your password"
          />
        </div>

        <div class="mt-5">
          <button id="sign-in-btn" class="w-full px-5 py-2.5 bg-primary-400 hover:bg-primary-500 rounded-lg border-none text-sm font-bold text-neutral-900 cursor-pointer transition-colors duration-200">Sign In</button>
        </div>

        <p class="text-center text-xs text-neutral-400 dark:text-neutral-500 mt-4">
          Don't have an account?
          <a href="#" id="sign-up-link" class="text-primary-500 hover:text-primary-600 dark:text-primary-400 dark:hover:text-primary-300 font-medium">Sign Up</a>
        </p>
      </div>

      <!-- Server field (always visible, disabled when connected) -->
      <div class="mt-5 pt-4 border-t border-neutral-200 dark:border-neutral-700">
        <label for="server" class="block text-[13px] font-medium text-neutral-600 dark:text-neutral-400 mb-1.5">Save Button Server</label>
        <input
          type="url"
          id="server"
          class="w-full px-3 py-2.5 border border-neutral-200 dark:border-neutral-700 rounded bg-white dark:bg-neutral-800 text-sm text-neutral-900 dark:text-neutral-100 transition-colors duration-200 focus:outline-none focus:border-primary-400 placeholder:text-neutral-400 dark:placeholder:text-neutral-500 disabled:bg-neutral-100 dark:disabled:bg-neutral-800/50 disabled:text-neutral-400 dark:disabled:text-neutral-500 disabled:cursor-not-allowed"
          placeholder="https://savebutton.com"
          title="The URL of your Save Button server"
        />
        <p id="server-hint" class="text-xs text-neutral-400 dark:text-neutral-500 mt-1">The URL of your Save Button server</p>
      </div>

      <!-- Ngrok/private IP warning -->
      <div id="ngrok-warning" class="hidden mt-3 px-3 py-2.5 rounded-lg bg-amber-50 dark:bg-amber-950/30 border border-amber-200 dark:border-amber-800 text-xs text-amber-700 dark:text-amber-300 flex items-start gap-2">
        <svg class="w-4 h-4 text-amber-500 shrink-0 mt-0.5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 2.495zM10 6a.75.75 0 01.75.75v3.5a.75.75 0 01-1.5 0v-3.5A.75.75 0 0110 6zm0 9a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd" /></svg>
        <span>Email/password sign-in works with a LAN IP, but OAuth (Google, Microsoft) will not. Use an ngrok tunnel for OAuth testing.</span>
      </div>

      <div id="status" class="hidden"></div>
    </div>
    <script type="module" src="./options/main.ts"></script>
  </body>
</html>
